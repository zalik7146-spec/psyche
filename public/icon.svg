<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0e0c09"/>
  <rect width="512" height="512" rx="112" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1a13"/>
      <stop offset="100%" style="stop-color:#0e0c09"/>
    </linearGradient>
  </defs>
  <!-- Feather pen -->
  <g transform="translate(256,256)">
    <!-- Feather body -->
    <path d="M0,-110 C40,-80 80,-30 60,40 C40,90 -10,110 -40,90 C-20,60 10,20 0,-20 C-10,-60 -40,-90 -10,-110 Z"
          fill="#c4813c" opacity="0.9"/>
    <path d="M0,-110 C-40,-80 -80,-30 -60,40 C-40,90 10,110 40,90 C20,60 -10,20 0,-20 C10,-60 40,-90 10,-110 Z"
          fill="#a06830" opacity="0.7"/>
    <!-- Quill tip -->
    <path d="M-8,90 L0,130 L8,90 Z" fill="#c4813c"/>
    <!-- Center vein -->
    <line x1="0" y1="-100" x2="0" y2="120" stroke="#0e0c09" stroke-width="2" opacity="0.4"/>
    <!-- Side veins -->
    <line x1="0" y1="-60" x2="40" y2="-20" stroke="#0e0c09" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-20" x2="35" y2="20" stroke="#0e0c09" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="20" x2="25" y2="55" stroke="#0e0c09" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-60" x2="-40" y2="-20" stroke="#0e0c09" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-20" x2="-35" y2="20" stroke="#0e0c09" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="20" x2="-25" y2="55" stroke="#0e0c09" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="150" fill="url(#glow)" opacity="0.15"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c4813c"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
</svg>
