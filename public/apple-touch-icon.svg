<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2418;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c882;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4813c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" ry="40" fill="url(#bg2)"/>
  <rect width="180" height="180" rx="40" ry="40" fill="none" stroke="url(#gold2)" stroke-width="3" opacity="0.3"/>

  <!-- Ψ symbol -->
  <text x="90" y="88" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="72" font-weight="bold"
        fill="url(#gold2)">Ψ</text>

  <!-- Underline -->
  <line x1="50" y1="130" x2="130" y2="130" stroke="url(#gold2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Text -->
  <text x="90" y="155" text-anchor="middle"
        font-family="Georgia, serif" font-size="14" font-weight="600" letter-spacing="4"
        fill="url(#gold2)" opacity="0.8">PSYCHE</text>
</svg>
